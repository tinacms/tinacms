name: Playwright — Hugo kitchen-sink
on:
  pull_request:
    branches:
      - main
    paths:
      - 'examples/hugo/kitchen-sink/**'
      - '.github/workflows/playwright-hugo-kitchen-sink.yml'
jobs:
  e2e:
    name: hugo-kitchen-sink-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
          run_install: false
      - name: Install dependencies
        run: pnpm install
      - name: Build workspace packages
        run: pnpm build
      - name: Install Playwright browsers
        working-directory: examples/hugo/kitchen-sink
        run: npx playwright install --with-deps chromium
      - name: Run Hugo kitchen-sink Playwright tests
        working-directory: examples/hugo/kitchen-sink
        run: npx playwright test
        env:
          CI: true
