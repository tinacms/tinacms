name: Playwright — Hugo kitchen-sink
on:
  pull_request:
    branches:
      - main
    paths:
      - 'examples/hugo/kitchen-sink/**'
      - '.github/workflows/playwright-hugo-kitchen-sink.yml'
jobs:
  e2e:
    name: hugo-kitchen-sink-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json
          run_install: false
      - name: Install dependencies
        run: pnpm install
      - name: Build workspace packages
        run: pnpm build
      - name: Install Playwright browsers
        working-directory: examples/hugo/kitchen-sink
        run: npx playwright install --with-deps chromium
      - name: Run Hugo kitchen-sink Playwright tests
        working-directory: examples/hugo/kitchen-sink
        run: npx playwright test
        env:
          CI: true
