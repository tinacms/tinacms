name: Build TinaCMS Starter Templates

on:
  workflow_dispatch:
    inputs:
      tina_version:
        description: 'Version applied to any Tina package not listed in published_packages (semver, dist-tag, or snapshot tag, e.g. 2.5.0, latest, or my-branch). Defaults to latest.'
        required: false
        default: 'latest'
        type: string
      published_packages:
        description: 'JSON array [{name, version}] of per-package versions to test. Use when packages carry different versions — e.g. a partial tagged release or a prod publish where only some packages changed. Packages omitted here fall back to tina_version.'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 9 * * 1'

jobs:
  build-templates:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        package-manager: [yarn, npm, pnpm]
        template:
          - tina-nextjs-starter
          - tina-hugo-starter
          - tina-remix-starter
          - tina-astro-starter
          - tina-docs
          - tinasaurus
          - basic
        node-version: [22, 24, 25]
    outputs:
      failed: ${{ steps.report-errors.outputs.failed }}

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: '10'
        if: ${{ matrix.package-manager == 'pnpm' }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 0.139.4
        if: ${{ matrix.template == 'tina-hugo-starter' }}

      - name: Setup build tokens
        run: |
          if [[ "${{ matrix.template }}" == "tina-nextjs-starter" ]]; then
            echo "NEXT_PUBLIC_TINA_CLIENT_ID=${{ secrets.TINA_CLOUD_STARTER_CLIENT_ID }}" >> $GITHUB_ENV
            echo "TINA_TOKEN=${{ secrets.TINA_CLOUD_STARTER_TOKEN }}" >> $GITHUB_ENV
          elif [[ "${{ matrix.template }}" == "tina-hugo-starter" ]]; then
            echo "TINA_CLIENT_ID=${{ secrets.TINA_HUGO_STARTER_CLIENT_ID }}" >> $GITHUB_ENV
            echo "TINA_TOKEN=${{ secrets.TINA_HUGO_STARTER_TOKEN }}" >> $GITHUB_ENV
          elif [[ "${{ matrix.template }}" == "tina-remix-starter" ]]; then
            echo "TINA_CLIENT_ID=${{ secrets.TINA_REMIX_STARTER_CLIENT_ID }}" >> $GITHUB_ENV
            echo "TINA_TOKEN=${{ secrets.TINA_REMIX_STARTER_TOKEN }}" >> $GITHUB_ENV
          elif [[ "${{ matrix.template }}" == "tina-astro-starter" ]]; then
            echo "PUBLIC_TINA_CLIENT_ID=${{ secrets.TINA_ASTRO_STARTER_CLIENT_ID }}" >> $GITHUB_ENV
            echo "TINA_TOKEN=${{ secrets.TINA_ASTRO_STARTER_TOKEN }}" >> $GITHUB_ENV
          elif [[ "${{ matrix.template }}" == "tina-docs" ]]; then
            echo "NEXT_PUBLIC_TINA_CLIENT_ID=${{ secrets.TINA_DOCS_CLIENT_ID }}" >> $GITHUB_ENV
            echo "TINA_TOKEN=${{ secrets.TINA_DOCS_TOKEN }}" >> $GITHUB_ENV
          elif [[ "${{ matrix.template }}" == "tinasaurus" ]]; then
            echo "NEXT_PUBLIC_TINA_CLIENT_ID=${{ secrets.TINASAURUS_CLIENT_ID }}" >> $GITHUB_ENV
            echo "TINA_TOKEN=${{ secrets.TINASAURUS_TOKEN }}" >> $GITHUB_ENV
          elif [[ "${{ matrix.template }}" == "basic" ]]; then
            echo "NEXT_PUBLIC_TINA_CLIENT_ID=${{ secrets.BASIC_CLIENT_ID }}" >> $GITHUB_ENV
            echo "TINA_TOKEN=${{ secrets.BASIC_TOKEN }}" >> $GITHUB_ENV
          fi

          echo "NEXT_PUBLIC_TINA_BRANCH=main" >> $GITHUB_ENV
          echo "TINA_BRANCH=main" >> $GITHUB_ENV

      - name: Run create-tina-app
        id: create-tina-app
        run: npx create-tina-app@latest template-repo --pkg-manager ${{ matrix.package-manager }} --template ${{ matrix.template }} --noTelemetry ${{ matrix.template == 'tina-docs' && '--theme default' || '' }}

      - name: Install and pin Tina packages
        id: install
        env:
          PUBLISHED_PACKAGES: ${{ inputs.published_packages }}
          TINA_VERSION: ${{ inputs.tina_version || 'latest' }}
        run: |
          cd template-repo
          PKG_MANAGER="${{ matrix.package-manager }}"

          # For each tinacms/@tinacms/* package found in this starter's package.json:
          #   - Use the exact version from published_packages if it was part of this release.
          #   - Fall back to TINA_VERSION (default: "latest") for packages not in the release,
          #     e.g. when only a subset of Tina packages changed.
          # published_packages is a JSON array [{name, version}] passed by the publish workflow,
          # or an empty array for cron/manual runs.
          TINA_PKGS=$(jq -r --arg fallback "$TINA_VERSION" \
            --argjson published "${PUBLISHED_PACKAGES:-[]}" '
            [(.dependencies // {}), (.devDependencies // {})] |
            add // {} |
            to_entries[] |
            select(.key == "tinacms" or (.key | startswith("@tinacms/"))) |
            . as {key: $pkg} |
            # Look up this package in the published list; fall back to $fallback if not found.
            (($published | map(select(.name == $pkg)) | first | .version) // $fallback) as $ver |
            $pkg + "@" + $ver
          ' package.json | tr '\n' ' ')

          if [ -n "$TINA_PKGS" ]; then
            echo "Pinning Tina packages: $TINA_PKGS"
            # Using "add"/"install" rather than a plain install so that only the Tina packages
            # are re-resolved, leaving the rest of the lock file intact for other dependencies.
            case "$PKG_MANAGER" in
              pnpm) pnpm add $TINA_PKGS ;;
              yarn) yarn add $TINA_PKGS ;;
              npm)  npm install $TINA_PKGS ;;
            esac
          else
            echo "No Tina packages found in package.json, running standard install"
            $PKG_MANAGER install
          fi

      - name: Run build
        id: build
        run: |
          cd template-repo
          ${{ matrix.package-manager }} run build

      - name: Report errors
        continue-on-error: false
        id: report-errors
        if: failure()
        run: |
          if [[ "${{ steps.create-tina-app.outcome }}" == "failure" ]]; then
            ERROR_STEP="create-tina-app"
          elif [[ "${{ steps.install.outcome }}" == "failure" ]]; then
            ERROR_STEP="install"
          else
            ERROR_STEP="build"
          fi

          ISSUE_TITLE="Starter template '${{ matrix.template }}' failed during $ERROR_STEP with ${{ matrix.package-manager }} using Node ${{ matrix.node-version }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ISSUE_BODY=$(cat <<EOF
          The **${{ matrix.template }}** starter template failed during $ERROR_STEP with **${{ matrix.package-manager }}** using Node **${{ matrix.node-version }}**.

          Check the full workflow logs for more details: [View Workflow Run]($RUN_URL)
          EOF
          )

          echo $ISSUE_TITLE >> $GITHUB_STEP_SUMMARY
          echo "failed=true" >> $GITHUB_OUTPUT

          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          if gh issue -R tinacms/tinacms list --state open --limit 100 --search "$ISSUE_TITLE" | grep -q "$ISSUE_TITLE"; then
            echo "Issue already exists. Skipping issue creation."
          else
            echo "Creating a new issue..."
            gh issue -R tinacms/tinacms create --title "$ISSUE_TITLE" --label "bug" --body "$ISSUE_BODY"
          fi

  # Required to check for failures due to the `continue-on-error` being set to true.
  check-failures:
    needs: build-templates
    runs-on: ubuntu-latest
    steps:
      - name: Check if any job failed
        run: |
          if [[ "${{ needs.build-templates.outputs.failed }}" == "true" ]]; then
            echo "One or more commands failed."
            exit 1
          else
            echo "All commands succeeded."
          fi
