name: Publish
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      test_graphql_update:
        description: 'Test the @tinacms/graphql update flow to tinacloud'
        required: false
        default: false
        type: boolean
      test_version:
        description: 'Version to simulate (e.g., 2.2.0)'
        required: false
        default: '2.2.0'
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish-tagged-pr:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false &&
      contains(github.event.pull_request.labels.*.name, 'tagged') &&
      github.event.pull_request.title != 'Version Packages'
    runs-on: ubuntu-latest
    outputs:
      # Consumed by the smoke-templates job below. packages_csv is "name,version"
      # per line for every package republished under this PR's snapshot tag.
      packages_csv: ${{ steps.package-versions.outputs.packages_csv }}
      published_tag: ${{ steps.publish.outputs.published_tag }}
    permissions:
      contents: read
      id-token: write # Required for OIDC authentication with npm
      pull-requests: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        id: pnpm-install
        with:
          package_json_file: package.json
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Build Types
        run: pnpm types

      - name: Publish tagged PR
        id: publish
        run: |
          echo running on branch ${BRANCH_NAME}
          pnpm version:snapshot $(echo ${{ github.sha }} | cut -c1-7)
          pnpm publish -r --tag ${BRANCH_NAME} --no-git-checks --access public
          echo "Published NPM tag: $BRANCH_NAME" >> $GITHUB_STEP_SUMMARY
          # Surface the exact tag for the smoke-templates job (no independent re-derivation).
          echo "published_tag=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

      - name: Get published package versions
        id: package-versions
        run: |
          set -e
          
          echo "🔍 Checking for modified package.json files..."
          
          # Find all modified package.json files (uncommitted changes from version:snapshot)
          modified_packages=$(git diff --name-only | grep 'package\.json$' || true)
          
          if [ -z "$modified_packages" ]; then
            echo "⚠️ No modified package.json files found"
            echo "packages_csv=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "📦 Found modified package.json files:"
          echo "$modified_packages"
          
          # Build a CSV with one package per line (package,version)
          packages_csv=""
          
          for pkg_file in $modified_packages; do
            if [ -f "$pkg_file" ]; then
              pkg_name=$(jq -r '.name' "$pkg_file")
              pkg_version=$(jq -r '.version' "$pkg_file")
              
              if [ "$pkg_name" != "null" ] && [ "$pkg_version" != "null" ]; then
                echo "  Found: $pkg_name@$pkg_version"
                
                if [ -n "$packages_csv" ]; then
                  packages_csv="${packages_csv}"$'\n'
                fi
                
                packages_csv="${packages_csv}${pkg_name},${pkg_version}"
              fi
            fi
          done
          
          echo "📋 Generated CSV:"
          echo "$packages_csv"
          
          # Use heredoc for multiline output
          echo "packages_csv<<EOF" >> $GITHUB_OUTPUT
          echo "$packages_csv" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment on PR with install instructions
        if: steps.package-versions.outputs.packages_csv != ''
        uses: actions/github-script@v7
        env:
          PACKAGES_CSV: ${{ steps.package-versions.outputs.packages_csv }}
        with:
          script: |
            console.log('🔍 Starting PR comment script...');
            
            if (
              !context.payload ||
              !context.payload.pull_request ||
              !context.payload.pull_request.head ||
              !context.payload.pull_request.head.ref ||
              !context.payload.pull_request.number
            ) {
              throw new Error('Missing pull_request context. Cannot comment on PR.');
            }

            const packagesCsv = process.env.PACKAGES_CSV;
            console.log('📦 Packages CSV:', packagesCsv);
            
            // Parse CSV format: one line per package "name,version"
            const packages = packagesCsv.trim().split('\n').map(line => {
              const [name, version] = line.split(',');
              return { name, version };
            });
            console.log('✅ Parsed packages:', packages);
            
            const branchName = context.payload.pull_request.head.ref;
            console.log('🌿 Branch name:', branchName);
            
            let packagesSection = '\n**Published Packages:**\n';
            for (const pkg of packages) {
              packagesSection += `- \`${pkg.name}@${pkg.version}\`\n`;
            }
            
            console.log('📝 Generated packages section:', packagesSection);
            
            // Generate install commands using actual versions
            let installCommands = packages.map(pkg => `pnpm add ${pkg.name}@${pkg.version}`).join('\n');

            const comment = `## 📦 Tagged Release Published

            Your tagged PR has been published! You can install the packages using their version tags:

            \`\`\`bash
            ${installCommands}
            \`\`\`

            ${packagesSection}

            **Commit:** \`${context.sha}\`
            `;
            
            console.log('💬 Posting comment to PR #' + context.payload.pull_request.number);
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment
            });
            
            console.log('✅ Comment posted successfully!');

  # PR-time smoke test: scaffold a couple of starters and build them against the
  # snapshot packages the publish-tagged-pr job just pushed to npm, so a PR's
  # actual artifacts (not npm `latest`) are validated before merge.
  #
  # IMPORTANT: the snapshot only contains packages with pending changesets
  # (changeset version --snapshot). So the build environment here is
  # "PR snapshot packages + `latest` for every unchanged Tina package" — NOT a
  # full monorepo snapshot.
  smoke-templates:
    needs: publish-tagged-pr
    # Same trigger + fork guard as publish-tagged-pr: this only makes sense for the
    # internal-PR snapshot that job published.
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false &&
      contains(github.event.pull_request.labels.*.name, 'tagged') &&
      github.event.pull_request.title != 'Version Packages'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    strategy:
      # Report every cell independently; any failure blocks the PR (no continue-on-error).
      fail-fast: false
      matrix:
        package-manager: [pnpm, npm]
        template: [basic, tina-nextjs-starter]
    env:
      PACKAGES_CSV: ${{ needs.publish-tagged-pr.outputs.packages_csv }}
      SNAPSHOT_TAG: ${{ needs.publish-tagged-pr.outputs.published_tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: '10'
        if: ${{ matrix.package-manager == 'pnpm' }}

      - name: Decide whether to run
        id: gate
        run: |
          # No published packages => no pending changesets => nothing PR-specific
          # to validate. Skip with a clear message rather than degrading into a
          # pure `@latest` test.
          if [ -z "$(printf '%s' "$PACKAGES_CSV" | tr -d '[:space:]')" ]; then
            echo "No PR snapshot packages were published (no pending changesets); nothing PR-specific to validate. Skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "PR snapshot published under npm dist-tag: $SNAPSHOT_TAG"
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve create-tina-app spec
        id: cta
        if: steps.gate.outputs.run == 'true'
        run: |
          # Prefer the concrete published version from the snapshot (robust; avoids
          # any branch-name-as-dist-tag validity concern).
          CTA_VERSION=$(printf '%s\n' "$PACKAGES_CSV" | awk -F, '$1=="create-tina-app"{print $2; exit}')
          if [ -n "$CTA_VERSION" ]; then
            echo "create-tina-app published in snapshot: $CTA_VERSION"
            echo "spec=create-tina-app@$CTA_VERSION" >> "$GITHUB_OUTPUT"
          else
            # Not in the snapshot. If the PR actually changes create-tina-app, a
            # changeset is almost certainly missing — fail loudly rather than
            # quietly testing the already-released create-tina-app@latest.
            CHANGED=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
              --paginate --jq '.[].filename' | grep -c '^packages/create-tina-app/' || true)
            if [ "${CHANGED:-0}" -gt 0 ]; then
              echo "::error::PR modifies packages/create-tina-app/** but no create-tina-app snapshot was published (missing changeset?). Its PR code cannot be smoke-tested."
              exit 1
            fi
            echo "::warning::create-tina-app not in this PR snapshot; scaffolding with create-tina-app@latest. This validates generated-app compatibility with PR snapshot Tina packages, but NOT PR-local create-tina-app code."
            echo "spec=create-tina-app@latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Scaffold template
        if: steps.gate.outputs.run == 'true'
        run: npx ${{ steps.cta.outputs.spec }} template-repo --pkg-manager ${{ matrix.package-manager }} --template ${{ matrix.template }} --noTelemetry

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          cd template-repo
          ${{ matrix.package-manager }} install

      - name: Bump Tina packages to the PR snapshot
        if: steps.gate.outputs.run == 'true'
        env:
          TINA_VERSION: latest
        # Adapted from .github/workflows/build-starter-templates.yml — the
        # "Update Tina packages to target version" step (lines ~104-176).
        # Differences: (1) the published-version source is this PR's packages_csv,
        # converted to the JSON shape that step's jq expects; (2) the yarn branch is
        # dropped (this matrix is pnpm/npm only).
        run: |
          cd template-repo
          PKG_MANAGER="${{ matrix.package-manager }}"

          # CSV ("name,version" per line) -> JSON [{name,version}] for jq below.
          PUBLISHED_PACKAGES=$(printf '%s\n' "$PACKAGES_CSV" \
            | awk -F, 'NF==2{printf "%s{\"name\":\"%s\",\"version\":\"%s\"}", sep, $1, $2; sep=","}')
          PUBLISHED_PACKAGES="[${PUBLISHED_PACKAGES}]"

          # For each matching package: use the exact snapshot version if it was part of
          # this release, else fall back to TINA_VERSION ("latest") for unchanged packages.
          TINA_FILTER='
            def is_tina: . == "tinacms" or startswith("@tinacms/") or startswith("tinacms-") or startswith("next-tinacms-");
            def resolve($published; $fallback):
              . as $pkg | (($published | map(select(.name == $pkg)) | first | .version) // $fallback);
          '
          TINA_DEPS=$(jq -r --arg fallback "$TINA_VERSION" \
            --argjson published "$PUBLISHED_PACKAGES" \
            "${TINA_FILTER}"'
            (.dependencies // {}) | to_entries[] |
            select(.key | is_tina) |
            .key + "@" + (.key | resolve($published; $fallback))
          ' package.json | tr '\n' ' ')
          TINA_DEV_DEPS=$(jq -r --arg fallback "$TINA_VERSION" \
            --argjson published "$PUBLISHED_PACKAGES" \
            "${TINA_FILTER}"'
            (.devDependencies // {}) | to_entries[] |
            select(.key | is_tina) |
            .key + "@" + (.key | resolve($published; $fallback))
          ' package.json | tr '\n' ' ')

          # Bypass the minimum release age gate for Tina packages so the just-published
          # snapshot versions install immediately.
          echo "min-release-age=0" >> .npmrc
          if [ "$PKG_MANAGER" = "pnpm" ]; then
            touch pnpm-workspace.yaml
            yq -i '.minimumReleaseAgeExclude += ["tinacms", "@tinacms/*"] | .minimumReleaseAgeExclude |= unique' pnpm-workspace.yaml
          fi

          echo "Updating Tina packages — deps: $TINA_DEPS dev deps: $TINA_DEV_DEPS"
          if [ -n "$TINA_DEPS" ]; then
            case "$PKG_MANAGER" in
              pnpm) pnpm add $TINA_DEPS ;;
              npm)  npm install $TINA_DEPS ;;
            esac
          fi
          if [ -n "$TINA_DEV_DEPS" ]; then
            case "$PKG_MANAGER" in
              pnpm) pnpm add -D $TINA_DEV_DEPS ;;
              npm)  npm install --save-dev $TINA_DEV_DEPS ;;
            esac
          fi

      - name: Build (local, no cloud credentials)
        if: steps.gate.outputs.run == 'true'
        run: |
          cd template-repo
          # Verified on main: both `basic` and `tina-nextjs-starter` define a
          # `build-local` script (tinacms build --content=local --skip-cloud-checks
          # -c "next build"). Resolve at runtime so a renamed script fails loudly
          # instead of silently running the cloud `build`.
          if jq -e '.scripts["build-local"]' package.json >/dev/null; then
            ${{ matrix.package-manager }} run build-local
          elif jq -e '.scripts["build:local"]' package.json >/dev/null; then
            ${{ matrix.package-manager }} run build:local
          else
            echo "::error::Generated template has no build-local/build:local script"
            exit 1
          fi

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for OIDC authentication with npm
      pull-requests: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Generate a token
        uses: actions/create-github-app-token@v1
        id: generate-token
        with:
          # uses https://github.com/organizations/tinacms/settings/apps/release-bot-allow-prs-and-push
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_SECRET }}

      - name: Check out code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        id: pnpm-install
        with:
          package_json_file: package.json
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Build Types
        run: pnpm types

      - name: Setup git credentials
        run: |
          git config --global user.email "bot@tina.io"
          git config --global user.name "Tina Release Bot"

      - name: Create release pull request or publish packages
        uses: changesets/action@v1
        id: changesets
        with:
          version: pnpm run version
          publish: pnpm run publish
          createGithubReleases: true
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token  }}
          NPM_CONFIG_PROVENANCE: true

      - name: Release to @dev channel
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          git checkout ${{ github.sha }}
          pnpm version:snapshot $(echo ${{ github.sha }} | cut -c1-7)
          pnpm run publish:beta
          echo "A release PR has been created: <https://github.com/tinacms/tinacms/pull/${{ steps.changesets.outputs.pullRequestNumber }}>" >> $GITHUB_STEP_SUMMARY
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token  }}
          NPM_CONFIG_PROVENANCE: true

      - name: Has TinaCMS been published
        id: newTinaCMSVersion
        if: steps.changesets.outputs.published == 'true'
        run: |
          # $publishedPackages is a json array of [{"name": "@xx/xx", "version": "1.2.0"}]
          # work out if tinacms has been published and output the version number
          newTinaCMSVersion=$(echo $publishedPackages | jq -r '.[] | select(.name == "tinacms") | .version')

          if [ -z "$newTinaCMSVersion" ]; then
            echo "❌ TinaCMS not published" >> $GITHUB_STEP_SUMMARY
          else
            echo "🚀 A new version of TinaCMS was released: $newTinaCMSVersion" >> $GITHUB_STEP_SUMMARY
          fi

          echo "newTinaCMSVersion=$newTinaCMSVersion" >> $GITHUB_OUTPUT
        env:
          publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}

      - name: Publish release notes
        if: steps.newTinaCMSVersion.outputs.newTinaCMSVersion != ''
        uses: benc-uk/workflow-dispatch@v1
        with:
          ref: main
          workflow: main-generate-release-notes.yml
          inputs: |
            {
              "release_name": "${{ steps.newTinaCMSVersion.outputs.newTinaCMSVersion }}"
            }
          token: ${{ steps.generate-token.outputs.token }}

      - name: Trigger starter template builds
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v7
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-starter-templates.yml',
              ref: 'main',
              inputs: {
                published_packages: process.env.PUBLISHED_PACKAGES || '[]'
              }
            });
            console.log('Triggered starter template builds with published packages');

      - name: Generate token for tinacloud
        if: steps.changesets.outputs.published == 'true'
        uses: actions/create-github-app-token@v1
        id: tinacloud-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_SECRET }}
          repositories: tinacloud

      - name: Notify tinacloud of published packages
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v7
        env:
          publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
        with:
          github-token: ${{ steps.tinacloud-token.outputs.token }}
          script: |
            const publishedPackages = JSON.parse(process.env.publishedPackages);

            console.log(`Notifying tinacloud of ${publishedPackages.length} published packages`);
            console.log(publishedPackages.map(p => `  ${p.name}@${p.version}`).join('\n'));

            // Trigger a repository dispatch event in the tinacloud repo
            await github.rest.repos.createDispatchEvent({
              owner: 'tinacms',
              repo: 'tinacloud',
              event_type: 'tinacms-release',
              client_payload: {
                packages: publishedPackages,
                source_repo: 'tinacms/tinacms',
                source_sha: context.sha
              }
            });

            console.log('✅ Repository dispatch event sent to tinacloud');
            core.summary.addRaw(`\n🔄 Notified tinacloud of ${publishedPackages.length} published packages`);
            await core.summary.write();

      - name: Summary
        if: steps.newTinaCMSVersion.outputs.newTinaCMSVersion == '' && steps.changesets.outputs.hasChangesets == 'false'
        run: |
          echo "❌ Nothing was published" >> $GITHUB_STEP_SUMMARY

  # Test job for manually triggering the tinacloud update flow
  test-tinacloud-update:
    if: github.event_name == 'workflow_dispatch' && inputs.test_graphql_update == true
    runs-on: ubuntu-latest
    steps:
      - name: Generate token for tinacloud
        uses: actions/create-github-app-token@v1
        id: tinacloud-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_SECRET }}
          repositories: tinacloud

      - name: Trigger tinacloud update (test mode)
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.tinacloud-token.outputs.token }}
          script: |
            const version = '${{ inputs.test_version }}';

            // Simulate a release with the test version
            const packages = [
              { name: '@tinacms/graphql', version: version }
            ];

            console.log(`[TEST] Notifying tinacloud of test packages:`);
            packages.forEach(p => console.log(`  ${p.name}@${p.version}`));

            await github.rest.repos.createDispatchEvent({
              owner: 'tinacms',
              repo: 'tinacloud',
              event_type: 'tinacms-release',
              client_payload: {
                packages: packages,
                source_repo: 'tinacms/tinacms',
                source_sha: context.sha
              }
            });

            console.log('✅ Repository dispatch event sent to tinacloud');
            core.summary.addRaw(`## Test Mode\n\n🔄 Notified tinacloud of test release\n- @tinacms/graphql@${version}`);
            await core.summary.write();
