name: Playwright — Astro init

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/@tinacms/cli/src/cmds/init/**'
      - 'playwright/astro-init/**'
      - '.github/workflows/playwright-astro-init.yml'
  workflow_dispatch:

jobs:
  init-e2e:
    name: astro-init-e2e
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: [minimal, basics, blog, starlight]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json
          run_install: false
      - name: Install dependencies
        run: pnpm install
      - name: Build the CLI (and its workspace build-deps)
        run: pnpm exec turbo run build --filter=@tinacms/cli
      - name: Install expect (drives the interactive init)
        run: sudo apt-get update && sudo apt-get install -y expect
      - name: Scaffold a fresh Astro project + run init
        id: init
        run: |
          PROJECT_DIR="$RUNNER_TEMP/astro-init-${{ matrix.template }}"
          bash playwright/astro-init/scaffold-and-init.sh "$PROJECT_DIR" "${{ matrix.template }}"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
      - name: Install Playwright browser
        working-directory: playwright/astro-init
        run: npx playwright install --with-deps chromium
      - name: Run init E2E (Playwright)
        working-directory: playwright/astro-init
        env:
          INIT_PROJECT_DIR: ${{ steps.init.outputs.project_dir }}
          CI: true
        run: pnpm test:e2e
      - name: Verify production build (auto-wired templates only)
        # minimal/basics start from an empty astro.config, so init writes the full
        # SSR config and `astro build` must pass. blog/starlight keep their own
        # non-empty config — init prints guidance instead of wiring it, so their
        # build needs the user's documented config change; they are validated in
        # dev only (the Playwright step above), not built here.
        if: matrix.template == 'minimal' || matrix.template == 'basics'
        working-directory: ${{ steps.init.outputs.project_dir }}
        run: npx astro build
