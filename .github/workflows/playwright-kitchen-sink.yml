name: Playwright — kitchen-sink

on:
  pull_request:
    # Run this workflow for PRs targeting main that change files in kitchen-sink
    branches:
      - main
    paths:
      - 'examples/next/kitchen-sink/**'
  push:
    # Also validate merged changes on main, scoped to kitchen-sink only
    branches:
      - main
    paths:
      - 'examples/next/kitchen-sink/**'

jobs:
  e2e:
    name: kitchen-sink-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter kitchen-sink exec playwright install --with-deps

      - name: Run kitchen-sink Playwright tests
        run: pnpm --filter kitchen-sink test:e2e
        env:
          CI: true
