name: Build, Test, Lint, Format for Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macOS-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        id: pnpm-install
        with:
          package_json_file: package.json
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Build Types
        run: pnpm types

      - name: Test
        run: pnpm test

      - name: Test Packages
        run: pnpm run test:packages

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: pnpm lint

      - name: Format
        if: matrix.os == 'ubuntu-latest'
        run: |
          pnpm format
          git diff --exit-code

      - name: Check Tina lock changes
        run: pnpm diff-tina-lock

  template-smoke:
    name: Template smoke (${{ matrix.template }} / ${{ matrix.package-manager }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        template: [basic, tina-nextjs-starter]
        package-manager: [pnpm, npm]
    env:
      # Dummy values for fork-safe smoke testing. The templates' `build-local`
      # script uses `tinacms build --content=local --skip-cloud-checks`, so
      # the build indexes content from the filesystem and skips cloud
      # validation — these env vars just need to be *set* (not real) to
      # satisfy the CLI's clientId/branch/token-must-be-configured check.
      # See tinacms/tina-nextjs-starter#60 and the matching PRs across the
      # other six starter repos for the template-side changes.
      NEXT_PUBLIC_TINA_CLIENT_ID: fake-id-for-smoke
      TINA_TOKEN: fake-token-for-smoke
      NEXT_PUBLIC_TINA_BRANCH: main
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup pnpm
        if: matrix.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Scaffold from template
        run: npx --yes create-tina-app@latest test-repo --pkg-manager ${{ matrix.package-manager }} --template ${{ matrix.template }} --noTelemetry

      - name: Install dependencies
        working-directory: test-repo
        run: ${{ matrix.package-manager }} install

      - name: Build template
        working-directory: test-repo
        run: ${{ matrix.package-manager }} run build-local
