name: Bug Report 🐞
description: Something isn't working as expected? Here is the right place to report.
labels: [bug, pending triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Filling in the fields below
        gives our team enough to act on it quickly.

        Full guide: https://tina.io/docs/contributing/bug-reports

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what is going wrong. Keep the literal error text for the field below.
      placeholder: |
        e.g. Selecting an image from the Media Library and clicking Insert blanks the entire admin instead of inserting the image.
    validations:
      required: true

  - type: textarea
    id: exact-error
    attributes:
      label: The exact error message
      description: Copy-paste it, don't paraphrase. The literal string is what we grep on.
      placeholder: |
        e.g. React error #31: Objects are not valid as a React child (found: object with keys {id, src, filename, directory, type, thumbnails}).
      render: shell
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: What you clicked, in order. A numbered list is enough — no video needed.
      placeholder: |
        1. Open TinaCMS admin
        2. Navigate to any page with an image field
        3. Click the image field → "Media Library" tab
        4. Select any image
        5. Click "Insert"
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: What you expected vs. what actually happened
      description: One sentence each is enough.
      placeholder: |
        Expected: The selected image is inserted and the src string is saved.
        Actual: TinaCMS admin goes blank / white screen.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Your environment
      description: |
        Version of `tinacms` and `@tinacms/cli`, framework, and **anything non-default** —
        custom MediaStore, custom auth, custom adapters, self-hosted setup. The non-default
        detail is often what points us straight at the root cause.
      placeholder: |
        - TinaCMS v3.7.2
        - @tinacms/cli v1.10.x
        - Next.js (App Router)
        - Self-hosted TinaCMS with custom GitHubMediaStore
        - Netlify deployment with serverless functions
    validations:
      required: true

  - type: input
    id: reproduction-repo
    attributes:
      label: A way for us to reproduce
      description: A link to a minimal reproduction repo is the gold standard. `npx create-tina-app@latest` is a good starting point if you need one.
      placeholder: https://github.com/your-username/tina-bug-repro
    validations:
      required: false

  - type: input
    id: client-id
    attributes:
      label: Client ID
      description: Required for TinaCloud-related issues. Find it in your TinaCloud dashboard.
      placeholder: e.g. d93c658e-dc1e-4f24-896a-5c6388939c39
    validations:
      required: false

  - type: checkboxes
    id: checkboxes
    attributes:
      label: Validations
      description: Before submitting the issue, please confirm the following
      options:
        - label: Follow our [Code of Conduct](https://github.com/tinacms/tinacms/blob/main/CODE_OF_CONDUCT.md)
          required: true
        - label: Read the [docs](https://tina.io/docs).
          required: true
        - label: Check that there isn't [already an issue](https://github.com/tinacms/tinacms/issues) that reports the same bug.
          required: true
