{{/*
  Card partial — content card with white/dark background, rounded border, shadow.
  Parameters (via dict):
    .content — inner HTML
    .class   — additional CSS classes (optional)
*/}}
{{ $class := .class | default "" }}

<div class="bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 flex flex-col gap-6 rounded-xl border border-gray-200 dark:border-gray-700 py-6 shadow-sm {{ $class }}">
  {{ .content }}
</div>
